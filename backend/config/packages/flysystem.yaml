# Flysystem configuration for S3 storage (Hetzner Object Storage)
# Only active in production — dev/test use local filesystem via VichUploader default

when@prod:
    flysystem:
        storages:
            default.storage:
                adapter: 'aws'
                options:
                    client: 's3_client'
                    bucket: '%env(S3_BUCKET)%'
                    prefix: 'documents'

    services:
        s3_client:
            class: Aws\S3\S3Client
            arguments:
                -
                    version: 'latest'
                    region: '%env(S3_REGION)%'
                    endpoint: '%env(S3_ENDPOINT)%'
                    use_path_style_endpoint: true
                    credentials:
                        key: '%env(S3_ACCESS_KEY)%'
                        secret: '%env(S3_SECRET_KEY)%'
