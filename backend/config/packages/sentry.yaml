when@prod:
    sentry:
        dsn: "%env(SENTRY_DSN)%"
        # this hooks into critical paths of the framework (and vendors) to perform
        # automatic instrumentation (there might be some performance penalty)
        # https://docs.sentry.io/platforms/php/guides/symfony/performance/instrumentation/automatic-instrumentation/
        tracing:
            enabled: false

        # Capture unhandled exceptions as Sentry issues. The Monolog handler below
        # feeds Sentry Logs (a separate product), so the two are complementary.
        register_error_listener: true
        # Left off to avoid reporting PHP deprecations as issues.
        register_error_handler: false

        options:
            environment: "%env(default::SENTRY_ENVIRONMENT)%"
            release: "%env(default::SENTRY_RELEASE)%"
            tags:
                component: backend
            # Required for LogsHandler (Sentry Logs API)
            enable_logs: true
            # Ignore 404 errors
            ignore_exceptions:
                - Symfony\Component\HttpKernel\Exception\NotFoundHttpException

    monolog:
        handlers:
            sentry:
                type: service
                id: Sentry\Monolog\LogsHandler

    services:
        Sentry\Monolog\LogsHandler:
            arguments:
                $logLevel: !php/const Monolog\Logger::ERROR

        Monolog\Processor\PsrLogMessageProcessor:
            tags: { name: monolog.processor, handler: sentry }
