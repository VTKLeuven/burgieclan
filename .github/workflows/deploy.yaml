name: "Deploy Stack (Frontend + Backend)"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      url:
        type: string
        required: true
    secrets:
      SSH_USER:
        required: true
      SSH_HOST:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      SENTRY_DSN:
        required: true

# Least-privilege default: the deploy job only needs packages: read to log in
# and pull from ghcr.io. The build jobs elevate to packages: write per-job so
# the nested reusable workflows can push images.
permissions:
  contents: read
  packages: read

jobs:
  build_backend:
    name: Build Backend
    uses: ./.github/workflows/build-backend.yaml
    permissions:
      contents: read
      packages: write
    with:
      environment: ${{ inputs.environment }}
      url: ${{ inputs.url }}

  build_frontend:
    name: Build Frontend
    uses: ./.github/workflows/build-frontend.yaml
    permissions:
      contents: read
      packages: write
    with:
      environment: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    # Inherit so the Sentry secrets resolve from the environment declared in
    # build-frontend.yaml's job, not from this (environment-less) caller job.
    secrets: inherit

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build_backend, build_frontend]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}

    steps:
      - name: Setup SSH access
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          # Fail fast with a clear error if the secret arrived empty or mangled
          # (e.g. environment secrets not reaching this workflow) instead of a
          # generic "Permission denied" at connect time.
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null || { echo "❌ SSH_PRIVATE_KEY is empty or not a valid private key"; exit 1; }
          # Log the key fingerprint (safe: no private material) so a failed
          # deploy can be checked against the key the server actually expects.
          ssh-keygen -lf ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" > ~/.ssh/known_hosts

      - name: Pull and deploy containers
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" << 'EOF'
            # Abort on the first failing command instead of continuing with a
            # broken deploy (e.g. a failed image pull followed by `down` would
            # otherwise take the site offline and still report success).
            set -e

            # Variables
            DEPLOY_DIR="${{ vars.DEPLOY_DIR }}"

            # Set IMAGE_TAG based on environment. Must match a tag pushed by the
            # build workflows: they tag images with the environment name
            # (plus `latest` and a sha tag for production).
            if [ "${{ inputs.environment }}" = "production" ]; then
              IMAGE_TAG="production"
            else
              IMAGE_TAG="dev"
            fi
            export IMAGE_TAG

            # Ensure DEPLOY_DIR is present
            if [ ! -d $DEPLOY_DIR ]; then
              echo "❌ DEPLOY_DIR does not exist"
              exit 1
            fi
            
            # Change to deployment directory
            cd $DEPLOY_DIR
            
            # Ensure data directory is present
            if [ ! -d ${{ vars.DATA_DIR }} ]; then
              echo "❌ Data directory does not exist"
              exit 1
            fi

            # Ensure JWT directory is present
            if [ ! -d ${{ vars.JWT_DIR }} ]; then
              echo "❌ JWT directory does not exist"
              exit 1
            fi

            COMPOSE_FILE="docker-compose.prod.yml"

            # Download the latest compose file from GitHub
            curl -o $COMPOSE_FILE \
                 "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/.docker/docker-compose.prod.yml"

            # Download the latest nginx.conf file from GitHub
            curl -o nginx.conf \
                 "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/.docker/nginx.conf"
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest images (backend and frontend)
            docker compose -f $COMPOSE_FILE pull
            
            # Stop and remove old containers
            docker compose -f $COMPOSE_FILE down
            
            # Start new containers with latest images
            docker compose -f $COMPOSE_FILE up -d --force-recreate --wait --wait-timeout 30
            
            # Verify all services are healthy. The jq predicate is vacuously
            # true for an empty list, so explicitly require at least one
            # running container.
            if [ -n "$(docker compose -f $COMPOSE_FILE ps -q)" ] && docker compose -f $COMPOSE_FILE ps --format json | jq -s -e 'all(.Health // "" | IN("healthy", ""))' > /dev/null; then
              echo "✅ All containers healthy"
              docker compose -f $COMPOSE_FILE ps
            else
              echo "❌ Some containers unhealthy"
              docker compose -f $COMPOSE_FILE ps
              docker compose -f $COMPOSE_FILE logs
              exit 1
            fi

            # Run database migrations
            echo "Running database migrations..."
            docker compose -f $COMPOSE_FILE exec -T backend php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration < /dev/null

            # Generate JWT keys
            echo "Generating JWT keys..."
            docker compose -f $COMPOSE_FILE exec -T backend php bin/console lexik:jwt:generate-keypair --skip-if-exists < /dev/null

            # Cleanup all old images on VM
            echo "Cleaning up old images..."
            docker image prune -a -f
          EOF

  sentry_release:
    name: Sentry Release
    runs-on: ubuntu-latest
    needs: [deploy]
    # Release tracking is best-effort: a bad/missing Sentry token must not
    # mark an otherwise successful deploy as failed.
    continue-on-error: true
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          # Full history so Sentry can associate commits with the release.
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: vtko-vzw
          SENTRY_PROJECT: burgieclan
        with:
          release: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          environment: ${{ inputs.environment }}
          set_commits: auto
          # Don't fail the deploy if commit association hits a missing ref (force-push/
          # rebase) or finds no new commits (e.g. first release / re-deploy).
          ignore_missing: true
          ignore_empty: true
