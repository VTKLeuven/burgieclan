name: "Build Backend Docker Container"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      url:
        type: string
        required: true

jobs:
  build_and_push:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: ${{ inputs.environment }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Convert repository name to lowercase
        id: repo_name
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ steps.repo_name.outputs.lowercase }}/backend
          tags: |
            # Tag with 'latest' for production environment
            type=raw,value=latest,enable=${{ inputs.environment == 'production' }}
            # Tag with environment
            type=raw,value=${{ inputs.environment }}
            # Tag with commit SHA
            type=sha,prefix=sha-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./backend
          file: ./backend/.docker/production/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo_name.outputs.lowercase }}/backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.repo_name.outputs.lowercase }}/backend:buildcache,mode=max
          build-args: |
            APP_ENV=prod
            FRONTEND_URL=${{ inputs.url }}
            COMMIT_HASH=${{ github.sha }}
            VERSION=${{ (github.ref_type == 'tag' && github.ref_name) || '' }}
            # VERSION is only set for tag releases, empty string for branch deployments
            # Sentry release: git tag on production releases, commit SHA on dev deploys.
            # Environment is the deploy stage (dev/production) so dev-server and prod-server
            # errors are distinguishable.
            SENTRY_RELEASE=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            SENTRY_ENVIRONMENT=${{ inputs.environment }}
