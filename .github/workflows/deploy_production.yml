name: "Deploy Production Stack (Frontend + Backend)"

on:
  release:
    types:
      - published
  # Manual trigger for testing the production deploy pipeline without
  # publishing a release (e.g. `gh workflow run deploy_production.yml`).
  workflow_dispatch:

# Ensure only one deployment runs at a time
concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

# GITHUB_TOKEN scope minted for the whole reusable-workflow chain.
# Nested reusable workflows can only restrict these, never elevate them,
# so packages: write must be granted here for the image push to succeed.
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/deploy.yaml
    with:
      environment: production
      url: https://burgieclan-new.vtk.be
    # secrets: inherit is required here: the secrets live on the GitHub
    # environments, and environment secrets only resolve inside the called
    # workflow's jobs (which declare `environment:`). Explicit
    # `SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}` mappings evaluate in
    # this caller job, which has no environment, and silently pass empty strings.
    secrets: inherit
